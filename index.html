        body {

            background-image: radial-gradient(circle at 30% 10%, #1b1233 0%, #0a0717 80%);

            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            color: #f0edff;
        }

        .game-container {

            width: 100%;
            background: rgba(18, 14, 34, 0.55);
            backdrop-filter: blur(12px);

            border-radius: 3.5rem;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 70, 200, 0.15), 0 0 30px rgba(180, 0, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-weight: 700;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #ff3b9e, #b44cff, #3bc9ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(180, 60, 255, 0.4);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header h1 i {
            font-size: 2rem;
            color: #ff6bcb;
            filter: drop-shadow(0 0 8px #ff3b9e);
        }

        .header-subtitle {
            font-size: 0.8rem;
            color: #a28ed0;
            letter-spacing: 1px;
            margin-top: -0.3rem;
            padding-left: 0.5rem;
        }

        .badge-refrao {
            background: linear-gradient(145deg, #ff3b9e33, #b44cff33);
            border: 1px solid #b44cff55;
            padding: 0.2rem 1rem;
            border-radius: 60px;
            font-size: 0.7rem;
            color: #d4caff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-top: 0.3rem;
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: #c6b8ff;
        }

        .stat-item i {
            color: #ffd966;
        }

        .stat-item .value {
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .lyric-card {
            background: rgba(28, 20, 48, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 2.5rem;
            padding: 1.8rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 180, 255, 0.08);
            box-shadow: inset 0 0 30px rgba(180, 0, 255, 0.1), 0 10px 30px -10px #000000aa;

            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .lyric-card::before {
            content: '♫';
            position: absolute;
            font-size: 8rem;
            opacity: 0.03;
            right: -20px;
            bottom: -30px;
            color: #b44cff;
            transform: rotate(-10deg);
        }

        .lyric-card .verse {
            font-size: 1.8rem;
            font-weight: 600;
            line-height: 1.5;
            color: #f2eaff;
            text-shadow: 0 0 30px rgba(180, 100, 255, 0.2);
            letter-spacing: -0.2px;
            padding: 0.5rem 0;
            position: relative;
            z-index: 1;
        }

        .lyric-card .verse i {
            color: #b77aff;
            margin: 0 0.5rem;
            opacity: 0.7;
        }

        .verse-hint {
            margin-top: 0.8rem;
            font-size: 0.75rem;
            color: #a28ed0;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }

        .verse-hint i {
            margin-right: 0.3rem;
            color: #ffd966;
        }

        .search-section {
            margin-bottom: 2rem;
            position: relative;
        }

        .search-wrapper {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
        }

            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(10, 6, 24, 0.7);
            backdrop-filter: blur(4px);
            color: #f0edff;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: all 0.25s ease;
            box-shadow: 0 0 0 0px rgba(180, 0, 255, 0);
        }

            border-color: #b44cff;
            box-shadow: 0 0 25px rgba(180, 0, 255, 0.3), 0 0 0 2px rgba(180, 0, 255, 0.2);
            background: rgba(14, 8, 34, 0.8);
        }

            color: #6b5d8a;
            font-weight: 400;
        }

        .btn-primary {

            border: none;
            padding: 1rem 2.2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            box-shadow: 0 0 25px rgba(150, 0, 255, 0.4);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'Space Grotesk', sans-serif;
        }

            transform: scale(1.02);
            box-shadow: 0 0 40px #b44cffaa;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-primary:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .autocomplete-list {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: rgba(18, 12, 38, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 1.8rem;
            padding: 0.5rem 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);

            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .autocomplete-list.active {
            display: block;
        }

        .autocomplete-item {

            cursor: pointer;
            transition: 0.1s ease;
            display: flex;
            justify-content: space-between;
            color: #d4caff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .autocomplete-item:hover {
            background: rgba(150, 70, 255, 0.2);
            color: white;
        }

        .autocomplete-item .artist-name {

            font-size: 0.85rem;
        }

        .comparison-table {

            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
        }

        .comparison-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.95rem;
        }

        .comparison-row:last-child {
            border-bottom: none;
        }

        .cmp-label {
            font-weight: 400;
            color: #b7a8e0;
            letter-spacing: 0.3px;
        }

        .cmp-value {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cmp-value .badge {

            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;

            border: 1px solid transparent;

            background: #1f5f3f;
            color: #9bffb0;
            border-color: #34b86b;

            background: #5f4b1a;
            color: #ffd966;
            border-color: #d4a022;
            box-shadow: 0 0 15px #ffbb3333;
        }
        .badge.red {
            background: #4f1e2a;
            color: #ff8a8a;
            border-color: #d43f4f;
            box-shadow: 0 0 15px #ff3b3b33;
        }

        .arrow-down { color: #ff7b9e; margin-left: 4px; }

        .cmp-value i {

            font-size: 0.9rem;
        }

            text-align: center;
            font-weight: 600;
            padding: 0.8rem 0;
            font-size: 1.1rem;
            min-height: 3.5rem;

            justify-content: center;

        }

        .feedback-message.error {
            color: #ffb0b0;
        }

        .feedback-message.loading {
            color: #b77aff;
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { opacity: 1; transform: translateY(-20px) rotate(0deg) scale(1); }
            100% { opacity: 0; transform: translateY(110vh) rotate(720deg) scale(0.2); }
        }

        .pulse-glow {
            animation: audioPulse 0.8s ease 3;
        }

        @keyframes audioPulse {
            0% { box-shadow: 0 0 0 0 #ff3b9e88, 0 0 0 0 #b44cff66; }

            background: linear-gradient(145deg, #3bc9ff, #7b4cff);

            padding: 0.8rem 2rem;
            border-radius: 60px;

            font-size: 1rem;
            color: white;

            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'Space Grotesk', sans-serif;
            margin-top: 1rem;

        .next-round-btn:hover {

            box-shadow: 0 0 40px #3bc9ffaa;

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #b44cff;
            animation: spin 1s ease-in-out infinite;

        @media (max-width: 600px) {

            .btn-primary { padding: 0.8rem 1.8rem; }
            .stats { padding: 0.3rem 1rem; gap: 0.8rem; }
            .stat-item { font-size: 0.8rem; }
        }

        .autocomplete-list::-webkit-scrollbar {
            width: 4px;
            background: transparent;
        }
        .autocomplete-list::-webkit-scrollbar-thumb {
            background: #b44cff;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="header">
            <div>
                <h1><i class="fas fa-guitar"></i> Matue-Liricle</h1>
                <div class="header-subtitle">Adivinhe a música pelo refrão</div>
                <span class="badge-refrao"><i class="fas fa-infinity"></i> Modo Infinito</span>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <i class="fas fa-trophy"></i>
                    <span>Score: </span>
                    <span class="value" id="scoreDisplay">0</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-gamepad"></i>
                    <span>Rodada: </span>
                    <span class="value" id="roundDisplay">1</span>
                </div>
            </div>
        </div>

        <div class="lyric-card" id="lyricCard">
            <div class="verse" id="verseDisplay">
                <i class="fas fa-quote-left"></i> Carregando refrão... <i class="fas fa-quote-right"></i>
            </div>
            <div class="verse-hint" id="verseCount">

            </div>
        </div>

        <div class="search-section">
            <div class="search-wrapper">
                <div class="search-input-wrapper">
                    <input type="text" id="songInput" placeholder="Digite o nome da música ou artista..." autocomplete="off">
                    <div class="autocomplete-list" id="autocompleteList"></div>
                </div>
                <button class="btn-primary" id="guessBtn"><i class="fas fa-guitar"></i> Palpitar</button>
            </div>
        </div>

        <div class="comparison-table" id="comparisonTable">
            <div class="comparison-row"><span class="cmp-label"><i class="fas fa-user"></i> Artista</span><span class="cmp-value" id="cmpArtist">---</span></div>
            <div class="comparison-row"><span class="cmp-label"><i class="fas fa-tag"></i> Genero</span><span class="cmp-value" id="cmpGenre">---</span></div>

            <div class="comparison-row"><span class="cmp-label"><i class="fas fa-chart-line"></i> Popularidade</span><span class="cmp-value" id="cmpPopularity">---</span></div>
        </div>

        <div class="feedback-message" id="feedbackMessage">
            <i class="fas fa-info-circle"></i> Adivinhe a música pelo refrão!
        </div>

        <div style="text-align: center; display: none;" id="nextRoundContainer">
            <button class="next-round-btn" id="nextRoundBtn">
                <i class="fas fa-forward"></i> Proxima Rodada
            </button>
        </div>
    </div>

        // ============================================================
        // ESTADO DO JOGO
        // ============================================================
        var gameState = {
            currentSong: null,
            currentVerseIndex: 0,
            attempts: 0,
            gameOver: false,
            guessedSongs: [],
            score: 0,
            round: 1,
            usedSongIds: [],
            availableSongs: []
        };

        // ============================================================
        // DOM ELEMENTOS
        // ============================================================
        var verseDisplay = document.getElementById('verseDisplay');
        var verseCount = document.getElementById('verseCount');
        var songInput = document.getElementById('songInput');
        var guessBtn = document.getElementById('guessBtn');
        var autocompleteList = document.getElementById('autocompleteList');
        var feedback = document.getElementById('feedbackMessage');
        var cmpArtist = document.getElementById('cmpArtist');
        var cmpGenre = document.getElementById('cmpGenre');
        var cmpDecade = document.getElementById('cmpDecade');
        var cmpNationality = document.getElementById('cmpNationality');
        var cmpPopularity = document.getElementById('cmpPopularity');
        var scoreDisplay = document.getElementById('scoreDisplay');
        var roundDisplay = document.getElementById('roundDisplay');
        var nextRoundContainer = document.getElementById('nextRoundContainer');
        var nextRoundBtn = document.getElementById('nextRoundBtn');
        var lyricCard = document.getElementById('lyricCard');

        // ============================================================
        // FUNÇÕES DO JOGO
        // ============================================================
        function getRandomSong() {
            if (gameState.availableSongs.length === 0) {
                gameState.availableSongs = MUSIC_DB.map(function(s) { return s.id; });
                gameState.usedSongIds = [];
            }

            var available = gameState.availableSongs.filter(function(id) {
                return gameState.usedSongIds.indexOf(id) === -1;
            });

            if (available.length === 0) {
                gameState.usedSongIds = [];
                available = gameState.availableSongs.slice();
            }

            var randomIndex = Math.floor(Math.random() * available.length);
            var songId = available[randomIndex];
            gameState.usedSongIds.push(songId);

            var song = MUSIC_DB.find(function(s) { return s.id === songId; });
            return song || MUSIC_DB[0];
        }

        function loadNewSong() {
            feedback.innerHTML = '<span class="loading-spinner"></span> Carregando novo refrão...';
            feedback.className = 'feedback-message loading';

            var song = getRandomSong();
            if (!song) song = MUSIC_DB[0];

            gameState.currentSong = song;
            gameState.currentVerseIndex = 0;
            gameState.attempts = 0;
            gameState.gameOver = false;
            gameState.guessedSongs = [];

            updateVerseDisplay();
            updateComparisonTable(null);

            feedback.innerHTML = '🎵 Novo refrão! Adivinhe a música! (Rodada ' + gameState.round + ')';
            feedback.className = 'feedback-message';
            guessBtn.disabled = false;
            songInput.disabled = false;
            songInput.value = '';
            nextRoundContainer.style.display = 'none';
            lyricCard.classList.remove('pulse-glow');
        }

        function updateVerseDisplay() {
            var song = gameState.currentSong;
            if (!song) return;
            var verseText = song.chorus[gameState.currentVerseIndex] || '...';
            verseDisplay.innerHTML = '<i class="fas fa-quote-left"></i> ' + verseText + ' <i class="fas fa-quote-right"></i>';
            var total = song.chorus.length;
            verseCount.innerHTML = '<i class="fas fa-info-circle"></i> Refrão da música (' + (gameState.currentVerseIndex + 1) +
                ' de ' + total + ' versos)';
        }

        function updateComparisonTable(guessSong) {
            if (!guessSong || !gameState.currentSong) {
                cmpArtist.innerHTML = '---';
                cmpGenre.innerHTML = '---';
                cmpDecade.innerHTML = '---';
                cmpNationality.innerHTML = '---';
                cmpPopularity.innerHTML = '---';
                return;
            }

            var currentSong = gameState.currentSong;

            var artistMatch = guessSong.artist === currentSong.artist ? 'green' :
                (currentSong.artist.includes(guessSong.artist) || guessSong.artist.includes(currentSong.artist) ? 'yellow' :
                    'red');
            cmpArtist.innerHTML = '<span class="badge ' + artistMatch + '">' + guessSong.artist + '</span>';

            var genreMatch = guessSong.genre === currentSong.genre ? 'green' : 'red';
            cmpGenre.innerHTML = '<span class="badge ' + genreMatch + '">' + guessSong.genre + '</span>';

            var guessYear = guessSong.year || 2000;
            var targetYear = currentSong.year || 2000;
            var decadeArrow = '';
            if (guessYear < targetYear) decadeArrow =
                '<span class="arrow-up"><i class="fas fa-arrow-up"></i> mais antiga</span>';
            else if (guessYear > targetYear) decadeArrow =
                '<span class="arrow-down"><i class="fas fa-arrow-down"></i> mais recente</span>';
            else decadeArrow = '<span style="color:#7affb0;"> mesma década</span>';
            cmpDecade.innerHTML = guessYear + ' ' + decadeArrow;

            var natMatch = guessSong.nationality === currentSong.nationality ? 'green' : 'red';
            cmpNationality.innerHTML = '<span class="badge ' + natMatch + '">' + guessSong.nationality + '</span>';

            var popDiff = (guessSong.popularity || 500) - (currentSong.popularity || 500);
            var popArrow = '';
            if (popDiff > 0) popArrow = '<span class="arrow-up"><i class="fas fa-arrow-up"></i> mais popular</span>';
            else if (popDiff < 0) popArrow = '<span class="arrow-down"><i class="fas fa-arrow-down"></i> menos popular</span>';
            else popArrow = '<span style="color:#7affb0;"> igual</span>';
            cmpPopularity.innerHTML = (guessSong.popularity || 500) + ' ' + popArrow;
        }

        function checkGuess(guessedSong) {
            var currentSong = gameState.currentSong;
            if (!currentSong) return false;

            var guessedTitle = guessedSong.title.toLowerCase().trim();
            var currentTitle = currentSong.title.toLowerCase().trim();

            if (guessedTitle === currentTitle ||
                guessedTitle.includes(currentTitle) ||
                currentTitle.includes(guessedTitle)) {

                gameState.gameOver = true;
                var points = Math.max(100 - (gameState.attempts * 10), 10);
                gameState.score += points;
                updateScoreAndRound();

                feedback.innerHTML = '🎉 VOCÊ ACERTOU! +' + points + ' pontos!';
                feedback.className = 'feedback-message success';
                spawnConfetti();
                lyricCard.classList.add('pulse-glow');

                gameState.currentVerseIndex = currentSong.chorus.length - 1;
                updateVerseDisplay();

                guessBtn.disabled = true;
                songInput.disabled = true;
                nextRoundContainer.style.display = 'block';

                return true;
            }
            return false;
        }

        function updateScoreAndRound() {
            scoreDisplay.textContent = gameState.score;
            roundDisplay.textContent = gameState.round;
        }

        function spawnConfetti() {
            var container = document.createElement('div');
            container.className = 'confetti-container';
            document.body.appendChild(container);
            var colors = ['#ff3b9e', '#b44cff', '#3bc9ff', '#ffd966', '#7affb0', '#ff6b6b'];
            for (var i = 0; i < 120; i++) {
                var el = document.createElement('div');
                el.className = 'confetti';
                el.style.left = Math.random() * 100 + '%';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.width = (Math.random() * 8 + 4) + 'px';
                el.style.height = (Math.random() * 8 + 4) + 'px';
                el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                el.style.animationDelay = (Math.random() * 0.8) + 's';
                container.appendChild(el);
            }
            setTimeout(function() { container.remove(); }, 4000);
        }

        function renderAutocomplete(filter) {
            filter = filter || '';
            var lower = filter.toLowerCase();

            var filtered = MUSIC_DB.filter(function(item) {
                return item.title.toLowerCase().indexOf(lower) !== -1 ||
                    item.artist.toLowerCase().indexOf(lower) !== -1;
            });

            autocompleteList.innerHTML = '';
            if (filtered.length === 0 || filter === '') {
                autocompleteList.classList.remove('active');
                return;
            }

            autocompleteList.classList.add('active');
            for (var j = 0; j < Math.min(10, filtered.length); j++) {
                var item = filtered[j];
                var div = document.createElement('div');
                div.className = 'autocomplete-item';
                div.innerHTML = '<span>' + item.title + '</span><span class="artist-name">' + item.artist +
                '</span>';
                div.addEventListener('click', (function(itemData) {
                    return function() {
                        songInput.value = itemData.title;
                        autocompleteList.classList.remove('active');
                    };
                })(item));
                autocompleteList.appendChild(div);
            }
        }

        function handleGuess() {
            if (gameState.gameOver) return;
            var query = songInput.value.trim();
            if (query === '') {
                feedback.innerHTML = ' Digite o nome da música ou artista.';
                feedback.className = 'feedback-message error';
                return;
            }

            var foundSong = null;
            for (var i = 0; i < MUSIC_DB.length; i++) {
                if (MUSIC_DB[i].title.toLowerCase() === query.toLowerCase()) {
                    foundSong = MUSIC_DB[i];
                    break;
                }
            }

            if (!foundSong) {
                feedback.innerHTML = ' Música não encontrada. Tente novamente.';
                feedback.className = 'feedback-message error';
                return;
            }

            var alreadyGuessed = false;
            for (var j = 0; j < gameState.guessedSongs.length; j++) {
                if (gameState.guessedSongs[j].id === foundSong.id) {
                    alreadyGuessed = true;
                    break;
                }
            }

            if (alreadyGuessed) {
                feedback.innerHTML = ' Você já tentou essa música. Escolha outra.';
                feedback.className = 'feedback-message error';
                return;
            }

            gameState.attempts++;
            gameState.guessedSongs.push(foundSong);
            updateComparisonTable(foundSong);

            var isCorrect = checkGuess(foundSong);
            if (isCorrect) return;

            if (gameState.currentSong &&
                gameState.currentVerseIndex < gameState.currentSong.chorus.length - 1) {
                gameState.currentVerseIndex++;
                updateVerseDisplay();
            }

            feedback.innerHTML = '❌ Errou! Tente novamente (tentativa ' + gameState.attempts + ')';
            feedback.className = 'feedback-message error';
            songInput.value = '';
            songInput.focus();
            autocompleteList.classList.remove('active');
        }

        function nextRound() {
            gameState.round++;
            updateScoreAndRound();
            nextRoundContainer.style.display = 'none';
            loadNewSong();
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        songInput.addEventListener('input', function(e) {
            renderAutocomplete(e.target.value);
        });

        songInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault();
                handleGuess(); }
            if (e.key === 'Escape') { autocompleteList.classList.remove('active'); }
        });

        guessBtn.addEventListener('click', handleGuess);
        nextRoundBtn.addEventListener('click', nextRound);

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-input-wrapper')) {
                autocompleteList.classList.remove('active');
            }
        });

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        function initGame() {
            gameState.score = 0;
            gameState.round = 1;
            gameState.availableSongs = MUSIC_DB.map(function(s) { return s.id; });
            gameState.usedSongIds = [];
            updateScoreAndRound();
            loadNewSong();
            console.log('🎵 Matue-Liricle iniciado com ' + MUSIC_DB.length + ' músicas!');
        }

        initGame();
    </script>
