<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0b081a;
            background-image: radial-gradient(circle at 30% 10%, #1b1233 0%, #0a0717 80%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            color: #f0edff;
        }

        .game-container {
            max-width: 900px;
            width: 100%;
            background: rgba(18, 14, 34, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 3.5rem;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 70, 200, 0.15), 0 0 30px rgba(180, 0, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-weight: 700;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #ff3b9e, #b44cff, #3bc9ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(180, 60, 255, 0.4);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header i {
            font-size: 2rem;
            color: #ff6bcb;
            filter: drop-shadow(0 0 8px #ff3b9e);
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: #c6b8ff;
        }

        .stat-item i {
            color: #ffd966;
        }

        .stat-item .value {
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .mode-selector {
            display: flex;
            gap: 0.5rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.3rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .mode-btn {
            padding: 0.4rem 1.2rem;
            border: none;
            border-radius: 60px;
            background: transparent;
            color: #a28ed0;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Space Grotesk', sans-serif;
        }

        .mode-btn.active {
            background: linear-gradient(145deg, #b44cff, #8b2fdb);
            color: white;
            box-shadow: 0 0 20px rgba(150, 0, 255, 0.3);
        }

        .mode-btn:hover:not(.active) {

        }

        .lyric-card {

            backdrop-filter: blur(8px);
            border-radius: 2.5rem;
            padding: 1.8rem 2rem;
            margin-bottom: 2rem;

            text-align: center;
            transition: all 0.4s ease;

            flex-direction: column;
            justify-content: center;
        }

        .lyric-card .verse {

            color: #f2eaff;

            padding: 0.2rem 0;

        .verse-reveal-count {

        }

        .search-section {

        }

            border: none;

            border-radius: 60px;

            font-size: 1rem;
            color: white;
            box-shadow: 0 0 25px rgba(150, 0, 255, 0.4);

            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.6rem;

            font-family: 'Space Grotesk', sans-serif;

        }

        .btn-primary:active {

        }

        .btn-primary:disabled {

            pointer-events: none;
        }

        .autocomplete-list {

            right: 0;

            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .autocomplete-list.active {
            display: block;
        }

        .autocomplete-item {

            cursor: pointer;
            transition: 0.1s ease;
            display: flex;
            justify-content: space-between;
            color: #d4caff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);

        }

        .autocomplete-item .artist-name {

        .comparison-table {

            backdrop-filter: blur(8px);

            padding: 1.5rem;
            margin: 1.8rem 0 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.03);

        }

        .comparison-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.95rem;
        }

        .comparison-row:last-child {
            border-bottom: none;
        }

        .cmp-label {
            font-weight: 400;
            color: #b7a8e0;
            letter-spacing: 0.3px;
        }

        .cmp-value {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cmp-value .badge {
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
        }

        .badge.green {
            background: #1f5f3f;
            color: #9bffb0;
            border-color: #34b86b;
            box-shadow: 0 0 15px #1aff6e33;
        }
        .badge.yellow {
            background: #5f4b1a;
            color: #ffd966;
            border-color: #d4a022;
            box-shadow: 0 0 15px #ffbb3333;
        }
        .badge.red {
            background: #4f1e2a;
            color: #ff8a8a;
            border-color: #d43f4f;
            box-shadow: 0 0 15px #ff3b3b33;
        }

        .arrow-up { color: #7affb0; margin-left: 4px; }
        .arrow-down { color: #ff7b9e; margin-left: 4px; }

        .cmp-value i {
            margin-right: 6px;
            font-size: 0.9rem;
        }

        .feedback-message {
            text-align: center;
            font-weight: 600;
            padding: 0.8rem 0;
            font-size: 1.1rem;
            min-height: 3.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;

        .feedback-message.success {
            color: #b4ffb4;
            text-shadow: 0 0 20px #00ff88aa;
        }

        .feedback-message.error {
            color: #ffb0b0;
        }

        .feedback-message.loading {
            color: #b77aff;
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { opacity: 1; transform: translateY(-20px) rotate(0deg) scale(1); }
            100% { opacity: 0; transform: translateY(110vh) rotate(720deg) scale(0.2); }
        }

        .pulse-glow {
            animation: audioPulse 0.8s ease 3;
        }

        @keyframes audioPulse {
            0% { box-shadow: 0 0 0 0 #ff3b9e88, 0 0 0 0 #b44cff66; }
            50% { box-shadow: 0 0 40px 10px #ff3b9eaa, 0 0 80px 30px #b44cff66; }
            100% { box-shadow: 0 0 0 0 #ff3b9e88, 0 0 0 0 #b44cff66; }
        }

        .next-round-btn {
            background: linear-gradient(145deg, #3bc9ff, #7b4cff);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            box-shadow: 0 0 25px rgba(59, 201, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'Space Grotesk', sans-serif;
            margin-top: 1rem;
        }

        .next-round-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px #3bc9ffaa;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #b44cff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .game-container { padding: 1.5rem; }
            .header h1 { font-size: 1.7rem; }
            .lyric-card .verse { font-size: 1.3rem; }
            .btn-primary { padding: 0.8rem 1.8rem; }
            .stats { padding: 0.3rem 1rem; gap: 0.8rem; }
            .stat-item { font-size: 0.8rem; }
        }

        .autocomplete-list::-webkit-scrollbar {
            width: 4px;
            background: transparent;
        }
        .autocomplete-list::-webkit-scrollbar-thumb {
            background: #b44cff;
            border-radius: 20px;
        }
    </style>
</head>
<body>

        <div style="display: flex; justify-content: center; margin-bottom: 1.5rem;">

                <button class="mode-btn active" data-mode="daily" id="dailyModeBtn">

        <div class="search-section">

            <button class="next-round-btn" id="nextRoundBtn">
                <i class="fas fa-forward"></i> Proxima Rodada

    </div>

    <script>
        // ============================================================
        // BANCO DE DADOS LOCAL (FALLBACK) + INTEGRACAO WIKIPEDIA
        // ============================================================
        var LOCAL_SONGS = [{

        // ============================================================
        // ESTADO DO JOGO

        var gameState = {
            mode: 'daily', // 'daily' ou 'infinite'
            currentSong: null,

            attempts: 0,
            gameOver: false,

        // ============================================================

        var verseDisplay = document.getElementById('verseDisplay');
        var verseCount = document.getElementById('verseCount');
        var songInput = document.getElementById('songInput');
        var guessBtn = document.getElementById('guessBtn');
        var autocompleteList = document.getElementById('autocompleteList');
        var feedback = document.getElementById('feedbackMessage');
        var cmpArtist = document.getElementById('cmpArtist');
        var cmpGenre = document.getElementById('cmpGenre');
        var cmpDecade = document.getElementById('cmpDecade');
        var cmpNationality = document.getElementById('cmpNationality');
        var cmpPopularity = document.getElementById('cmpPopularity');
        var scoreDisplay = document.getElementById('scoreDisplay');
        var roundDisplay = document.getElementById('roundDisplay');
        var nextRoundContainer = document.getElementById('nextRoundContainer');
        var nextRoundBtn = document.getElementById('nextRoundBtn');
        var dailyModeBtn = document.getElementById('dailyModeBtn');
        var infiniteModeBtn = document.getElementById('infiniteModeBtn');
        var lyricCard = document.getElementById('lyricCard');

        // ============================================================
        // FUNCOES DE BUSCA NA WIKIPEDIA
        // ============================================================
        function searchWikipediaSongs(query) {
            return new Promise(function(resolve, reject) {
                var url = 'https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=' +
                    encodeURIComponent(query + ' song') +
                    '&format=json&origin=*';

                fetch(url)
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        if (data.query && data.query.search) {
                            var results = data.query.search.map(function(item) {
                                return {
                                    title: item.title,
                                    snippet: item.snippet
                                };
                            });
                            resolve(results);
                        } else {
                            resolve([]);
                        }
                    })
                    .catch(function(error) {
                        console.error('Erro na busca Wikipedia:', error);
                        reject(error);
                    });
            });
        }

        function getSongFromWikipedia(title) {
            return new Promise(function(resolve, reject) {
                var url = 'https://en.wikipedia.org/w/api.php?action=query&prop=extracts&exintro&explaintext&titles=' +
                    encodeURIComponent(title) +
                    '&format=json&origin=*';

                fetch(url)
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        var pages = data.query.pages;
                        var pageId = Object.keys(pages)[0];
                        var page = pages[pageId];

                        if (page && page.extract) {
                            // Tentar extrair informacoes basicas
                            var extract = page.extract;
                            var lines = extract.split('\n').filter(function(l) { return l.trim().length > 0; });

                            // Tentar encontrar letras (geralmente em artigos de musicas)
                            var lyricsLines = [];
                            var foundLyrics = false;
                            for (var i = 0; i < lines.length; i++) {
                                var line = lines[i].trim();
                                if (line.toLowerCase().includes('lyrics') ||
                                    line.toLowerCase().includes('verse') ||
                                    line.toLowerCase().includes('chorus')) {
                                    foundLyrics = true;
                                    continue;
                                }
                                if (foundLyrics && line.length > 10 && !line.includes('[') && !line.includes('(')) {
                                    lyricsLines.push(line);
                                    if (lyricsLines.length >= 5) break;
                                }
                            }

                            // Se nao encontrou letras, pegar primeiras frases
                            if (lyricsLines.length === 0) {
                                var sentences = extract.split('.');
                                for (var j = 0; j < Math.min(5, sentences.length); j++) {
                                    if (sentences[j].trim().length > 15) {
                                        lyricsLines.push(sentences[j].trim() + '.');
                                    }
                                }
                            }

                            resolve({
                                title: page.title,
                                extract: extract,
                                lyrics: lyricsLines.length > 0 ? lyricsLines : ['Letras nao encontradas'],
                                pageUrl: 'https://en.wikipedia.org/wiki/' + encodeURIComponent(page.title)
                            });
                        } else {
                            resolve(null);
                        }
                    })
                    .catch(function(error) {
                        console.error('Erro ao buscar letras:', error);
                        reject(error);
                    });
            });
        }

        // ============================================================
        // GERAR MUSICA ALEATORIA (WIKIPEDIA OU LOCAL)
        // ============================================================
        function generateRandomSong() {
            return new Promise(function(resolve, reject) {
                // Lista de artistas populares para buscar
                var artists = [
                    'The Beatles', 'Queen', 'Michael Jackson', 'Madonna', 'Elvis Presley',
                    'Bob Dylan', 'David Bowie', 'Prince', 'Whitney Houston', 'Freddie Mercury',
                    'Miles Davis', 'John Lennon', 'Paul McCartney', 'Stevie Wonder', 'Aretha Franklin',
                    'Tupac', 'Nirvana', 'Radiohead', 'Pink Floyd', 'Led Zeppelin',
                    'Muse', 'Coldplay', 'U2', 'The Rolling Stones', 'The Who',
                    'The Beach Boys', 'The Doors', 'Jimi Hendrix', 'Janis Joplin', 'Joni Mitchell'
                ];

                var randomArtist = artists[Math.floor(Math.random() * artists.length)];

                // Buscar musicas do artista na Wikipedia
                searchWikipediaSongs(randomArtist)
                    .then(function(results) {
                        if (results && results.length > 0) {
                            // Filtrar resultados que parecem ser musicas (nao albums ou outras paginas)
                            var songResults = results.filter(function(r) {
                                var title = r.title.toLowerCase();
                                return !title.includes('album') &&
                                    !title.includes('discography') &&
                                    !title.includes('(album)') &&
                                    !title.includes('compilation');
                            });

                            if (songResults.length > 0) {
                                var randomSong = songResults[Math.floor(Math.random() * songResults.length)];
                                return getSongFromWikipedia(randomSong.title);
                            }
                        }
                        // Fallback: usar musica local aleatoria
                        var localSong = LOCAL_SONGS[Math.floor(Math.random() * LOCAL_SONGS.length)];
                        resolve({
                            title: localSong.title,
                            artist: localSong.artist,
                            genre: localSong.genre,
                            year: localSong.year,
                            nationality: localSong.nationality,
                            popularity: localSong.popularity,
                            lyrics: localSong.lyrics,
                            isLocal: true
                        });
                    })
                    .catch(function() {
                        // Fallback para erro
                        var localSong = LOCAL_SONGS[Math.floor(Math.random() * LOCAL_SONGS.length)];
                        resolve({
                            title: localSong.title,
                            artist: localSong.artist,
                            genre: localSong.genre,
                            year: localSong.year,
                            nationality: localSong.nationality,
                            popularity: localSong.popularity,
                            lyrics: localSong.lyrics,
                            isLocal: true
                        });
                    });
            });
        }

        // ============================================================
        // FUNCOES DO JOGO
        // ============================================================
        function generateDailySong() {
            // Usar musica fixa do dia (baseado na data)
            var today = new Date();
            var dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
            var index = dayOfYear % LOCAL_SONGS.length;
            var song = LOCAL_SONGS[index];
            return {
                title: song.title,
                artist: song.artist,
                genre: song.genre,
                year: song.year,
                nationality: song.nationality,
                popularity: song.popularity,
                lyrics: song.lyrics,
                isLocal: true,
                isDaily: true,
                id: song.id
            };
        }

        function getCurrentSong() {
            if (gameState.isDailyMode) {
                return generateDailySong();
            } else {
                // Modo infinito - usar musica aleatoria
                return gameState.currentSong;
            }
        }

        function loadNewSong() {
            var loadingFeedback = document.getElementById('feedbackMessage');
            loadingFeedback.innerHTML = '<span class="loading-spinner"></span> Carregando nova musica...';
            loadingFeedback.className = 'feedback-message loading';

            if (gameState.isDailyMode) {
                var dailySong = generateDailySong();
                gameState.currentSong = dailySong;
                gameState.currentVerseIndex = 0;
                gameState.attempts = 0;
                gameState.gameOver = false;
                gameState.guessedSongs = [];
                updateVerseDisplay();
                updateComparisonTable(null);
                feedback.innerHTML = ' Adivinhe a musica do dia!';
                feedback.className = 'feedback-message';
                guessBtn.disabled = false;
                songInput.disabled = false;
                songInput.value = '';
                nextRoundContainer.style.display = 'none';
                loadingFeedback.className = 'feedback-message';
                loadingFeedback.innerHTML = ' Adivinhe a musica do dia!';
                return;
            }

            // Modo infinito
            generateRandomSong()
                .then(function(songData) {
                    gameState.currentSong = {
                        title: songData.title || 'Musica Desconhecida',
                        artist: songData.artist || 'Artista Desconhecido',
                        genre: songData.genre || 'Genero Desconhecido',
                        year: songData.year || 2000,
                        nationality: songData.nationality || 'Nacionalidade Desconhecida',
                        popularity: songData.popularity || 500,
                        lyrics: songData.lyrics || ['Letra nao encontrada'],
                        isLocal: songData.isLocal || false,
                        wikipediaUrl: songData.pageUrl || null
                    };

                    gameState.currentVerseIndex = 0;
                    gameState.attempts = 0;
                    gameState.gameOver = false;
                    gameState.guessedSongs = [];

                    updateVerseDisplay();
                    updateComparisonTable(null);

                    feedback.innerHTML = ' Nova musica carregada! Adivinhe!';
                    feedback.className = 'feedback-message';
                    guessBtn.disabled = false;
                    songInput.disabled = false;
                    songInput.value = '';
                    nextRoundContainer.style.display = 'none';
                    loadingFeedback.className = 'feedback-message';
                    loadingFeedback.innerHTML = ' Nova musica carregada!';
                })
                .catch(function(error) {
                    console.error('Erro ao carregar musica:', error);
                    // Fallback: usar musica local
                    var localSong = LOCAL_SONGS[Math.floor(Math.random() * LOCAL_SONGS.length)];
                    gameState.currentSong = {
                        title: localSong.title,
                        artist: localSong.artist,
                        genre: localSong.genre,
                        year: localSong.year,
                        nationality: localSong.nationality,
                        popularity: localSong.popularity,
                        lyrics: localSong.lyrics,
                        isLocal: true
                    };
                    gameState.currentVerseIndex = 0;
                    gameState.attempts = 0;
                    gameState.gameOver = false;
                    gameState.guessedSongs = [];
                    updateVerseDisplay();
                    updateComparisonTable(null);
                    feedback.innerHTML = ' Musica carregada (fallback local)';
                    feedback.className = 'feedback-message';
                    guessBtn.disabled = false;
                    songInput.disabled = false;
                    songInput.value = '';
                    nextRoundContainer.style.display = 'none';
                    loadingFeedback.className = 'feedback-message';
                    loadingFeedback.innerHTML = ' Musica carregada!';
                });
        }

        function updateVerseDisplay() {
            var song = gameState.currentSong;
            if (!song) return;

            var verseText = song.lyrics[gameState.currentVerseIndex] || '...';
            verseDisplay.innerHTML = '"<i class="fas fa-music"></i> ' + verseText + ' <i class="fas fa-music"></i>"';
            var total = song.lyrics.length;
            verseCount.textContent = 'verso ' + (gameState.currentVerseIndex + 1) + ' de ' + total;
        }

        function updateComparisonTable(guessSong) {
            if (!guessSong || !gameState.currentSong) {
                cmpArtist.innerHTML = '---';
                cmpGenre.innerHTML = '---';
                cmpDecade.innerHTML = '---';
                cmpNationality.innerHTML = '---';
                cmpPopularity.innerHTML = '---';
                return;
            }

            var dailySong = gameState.currentSong;

            var artistMatch = guessSong.artist === dailySong.artist ? 'green' :
                (dailySong.artist.includes(guessSong.artist) || guessSong.artist.includes(dailySong.artist) ? 'yellow' :
                    'red');
            cmpArtist.innerHTML = '<span class="badge ' + artistMatch + '">' + guessSong.artist + '</span>';

            var genreMatch = guessSong.genre === dailySong.genre ? 'green' : 'red';
            cmpGenre.innerHTML = '<span class="badge ' + genreMatch + '">' + guessSong.genre + '</span>';

            var guessYear = guessSong.year || 2000;
            var targetYear = dailySong.year || 2000;
            var decadeArrow = '';
            if (guessYear < targetYear) decadeArrow =
                '<span class="arrow-up"><i class="fas fa-arrow-up"></i> mais antiga</span>';
            else if (guessYear > targetYear) decadeArrow =
                '<span class="arrow-down"><i class="fas fa-arrow-down"></i> mais recente</span>';
            else decadeArrow = '<span style="color:#7affb0;"> mesma decada</span>';
            cmpDecade.innerHTML = guessYear + ' ' + decadeArrow;

            var natMatch = guessSong.nationality === dailySong.nationality ? 'green' : 'red';
            cmpNationality.innerHTML = '<span class="badge ' + natMatch + '">' + guessSong.nationality + '</span>';

            var popDiff = (guessSong.popularity || 500) - (dailySong.popularity || 500);
            var popArrow = '';
            if (popDiff > 0) popArrow = '<span class="arrow-up"><i class="fas fa-arrow-up"></i> mais popular</span>';
            else if (popDiff < 0) popArrow = '<span class="arrow-down"><i class="fas fa-arrow-down"></i> menos popular</span>';
            else popArrow = '<span style="color:#7affb0;"> igual</span>';
            cmpPopularity.innerHTML = (guessSong.popularity || 500) + ' ' + popArrow;
        }

        function checkGuess(guessedSong) {
            var currentSong = gameState.currentSong;
            if (!currentSong) return false;

            // Comparar titulos (case insensitive)
            var guessedTitle = guessedSong.title.toLowerCase().trim();
            var currentTitle = currentSong.title.toLowerCase().trim();

            // Verificar se acertou (titulo igual ou similar)
            if (guessedTitle === currentTitle ||
                guessedTitle.includes(currentTitle) ||
                currentTitle.includes(guessedTitle)) {
                // ACERTOU!
                gameState.gameOver = true;

                // Calcular pontos baseado em tentativas
                var points = Math.max(100 - (gameState.attempts * 10), 10);
                gameState.score += points;

                updateScoreAndRound();

                feedback.innerHTML = ' VOCE ACERTOU! +' + points + ' pontos!';
                feedback.className = 'feedback-message success';
                spawnConfetti();
                lyricCard.classList.add('pulse-glow');

                // Revelar todos os versos
                gameState.currentVerseIndex = currentSong.lyrics.length - 1;
                updateVerseDisplay();

                guessBtn.disabled = true;
                songInput.disabled = true;

                // Mostrar botao proxima rodada
                nextRoundContainer.style.display = 'block';

                return true;
            }
            return false;
        }

        function updateScoreAndRound() {
            scoreDisplay.textContent = gameState.score;
            roundDisplay.textContent = gameState.round;
        }

        function spawnConfetti() {
            var container = document.createElement('div');
            container.className = 'confetti-container';
            document.body.appendChild(container);
            var colors = ['#ff3b9e', '#b44cff', '#3bc9ff', '#ffd966', '#7affb0', '#ff6b6b'];
            for (var i = 0; i < 120; i++) {
                var el = document.createElement('div');
                el.className = 'confetti';
                el.style.left = Math.random() * 100 + '%';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.width = (Math.random() * 8 + 4) + 'px';
                el.style.height = (Math.random() * 8 + 4) + 'px';
                el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                el.style.animationDelay = (Math.random() * 0.8) + 's';
                container.appendChild(el);
            }
            setTimeout(function() { container.remove(); }, 4000);
        }

        function renderAutocomplete(filter) {
            filter = filter || '';
            var lower = filter.toLowerCase();

            // Buscar no banco local e nas musicas ja carregadas
            var allTitles = LOCAL_SONGS.map(function(s) {
                return { title: s.title, artist: s.artist };
            });

            // Adicionar musica atual se nao estiver na lista
            if (gameState.currentSong && !gameState.currentSong.isLocal) {
                allTitles.push({
                    title: gameState.currentSong.title,
                    artist: gameState.currentSong.artist || 'Desconhecido'
                });
            }

            var filtered = allTitles.filter(function(item) {
                return item.title.toLowerCase().indexOf(lower) !== -1 ||
                    item.artist.toLowerCase().indexOf(lower) !== -1;
            });

            // Remover duplicatas
            var unique = [];
            var seen = {};
            for (var i = 0; i < filtered.length; i++) {
                var key = filtered[i].title + '|' + filtered[i].artist;
                if (!seen[key]) {
                    seen[key] = true;
                    unique.push(filtered[i]);
                }
            }

            autocompleteList.innerHTML = '';
            if (unique.length === 0 || filter === '') {
                autocompleteList.classList.remove('active');
                return;
            }

            autocompleteList.classList.add('active');
            for (var j = 0; j < Math.min(10, unique.length); j++) {
                var item = unique[j];
                var div = document.createElement('div');
                div.className = 'autocomplete-item';
                div.innerHTML = '<span>' + item.title + '</span><span class="artist-name">' + item.artist +
                '</span>';
                div.addEventListener('click', function(itemData) {
                    return function() {
                        songInput.value = itemData.title;
                        autocompleteList.classList.remove('active');
                    };
                }(item));
                autocompleteList.appendChild(div);
            }
        }

        function handleGuess() {
            if (gameState.gameOver) return;
            var query = songInput.value.trim();
            if (query === '') {
                feedback.innerHTML = ' Digite o nome de uma musica ou artista.';
                feedback.className = 'feedback-message error';
                return;
            }

            // Buscar no banco local
            var foundSong = null;
            for (var i = 0; i < LOCAL_SONGS.length; i++) {
                if (LOCAL_SONGS[i].title.toLowerCase() === query.toLowerCase()) {
                    foundSong = LOCAL_SONGS[i];
                    break;
                }
            }

            // Se nao encontrou localmente, tentar criar uma entrada baseada no input
            if (!foundSong) {
                // Verificar se o usuario digitou o nome da musica atual
                if (gameState.currentSong &&
                    gameState.currentSong.title.toLowerCase() === query.toLowerCase()) {
                    foundSong = {
                        title: gameState.currentSong.title,
                        artist: gameState.currentSong.artist,
                        genre: gameState.currentSong.genre,
                        year: gameState.currentSong.year,
                        nationality: gameState.currentSong.nationality,
                        popularity: gameState.currentSong.popularity
                    };
                } else {
                    feedback.innerHTML = ' Musica nao encontrada. Tente novamente.';
                    feedback.className = 'feedback-message error';
                    return;
                }
            }

            // Verificar se ja foi adivinhada
            var alreadyGuessed = false;
            for (var j = 0; j < gameState.guessedSongs.length; j++) {
                if (gameState.guessedSongs[j].title === foundSong.title) {
                    alreadyGuessed = true;
                    break;
                }
            }

            if (alreadyGuessed) {
                feedback.innerHTML = ' Voce ja tentou essa musica. Escolha outra.';
                feedback.className = 'feedback-message error';
                return;
            }

            gameState.attempts++;
            gameState.guessedSongs.push(foundSong);
            updateComparisonTable(foundSong);

            var isCorrect = checkGuess(foundSong);
            if (isCorrect) {
                return;
            }

            // Se errou: revela proximo verso
            if (gameState.currentSong &&
                gameState.currentVerseIndex < gameState.currentSong.lyrics.length - 1) {
                gameState.currentVerseIndex++;
                updateVerseDisplay();
            }

            feedback.innerHTML = ' Errou! Tente novamente (tentativa ' + gameState.attempts + ')';
            feedback.className = 'feedback-message error';
            songInput.value = '';
            songInput.focus();
            autocompleteList.classList.remove('active');
        }

        function nextRound() {
            gameState.round++;
            updateScoreAndRound();
            nextRoundContainer.style.display = 'none';
            lyricCard.classList.remove('pulse-glow');
            loadNewSong();
        }

        function switchMode(mode) {
            gameState.isDailyMode = (mode === 'daily');
            gameState.round = 1;
            gameState.score = 0;
            updateScoreAndRound();

            // Atualizar botoes
            dailyModeBtn.classList.toggle('active', mode === 'daily');
            infiniteModeBtn.classList.toggle('active', mode === 'infinite');

            // Resetar jogo
            loadNewSong();
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        songInput.addEventListener('input', function(e) {
            var val = e.target.value;
            renderAutocomplete(val);
        });

        songInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleGuess();
            }
            if (e.key === 'Escape') {
                autocompleteList.classList.remove('active');
            }
        });

        guessBtn.addEventListener('click', handleGuess);
        nextRoundBtn.addEventListener('click', nextRound);

        dailyModeBtn.addEventListener('click', function() {
            if (!gameState.isDailyMode) {
                switchMode('daily');
            }
        });

        infiniteModeBtn.addEventListener('click', function() {
            if (gameState.isDailyMode) {
                switchMode('infinite');
            }
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-input-wrapper')) {
                autocompleteList.classList.remove('active');
            }
        });

        // ============================================================
        // INICIALIZACAO
        // ============================================================
        function initGame() {
            gameState.isDailyMode = true;
            gameState.score = 0;
            gameState.round = 1;
            updateScoreAndRound();
            loadNewSong();

            // Adicionar algumas musicas de exemplo ao banco local para autocomplete
            console.log(' Melodle iniciado! Modo: ' + (gameState.isDailyMode ? 'Diario' : 'Infinito'));
            console.log(' Use "Diario" para musica do dia ou "Infinito" para desafios aleatorios');
        }

        initGame();
    </script>
