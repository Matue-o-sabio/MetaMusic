<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Liricle · Sertanejo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0b081a;
            background-image: radial-gradient(circle at 30% 10%, #1b1233 0%, #0a0717 80%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            color: #f0edff;
        }

        .game-container {
            max-width: 900px;
            width: 100%;
            background: rgba(18, 14, 34, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 3.5rem;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 70, 200, 0.15), 0 0 30px rgba(180, 0, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-weight: 700;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #ff3b9e, #b44cff, #3bc9ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(180, 60, 255, 0.4);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header h1 i {
            font-size: 2rem;
            color: #ff6bcb;
            filter: drop-shadow(0 0 8px #ff3b9e);
        }

        .header-subtitle {
            font-size: 0.8rem;
            color: #a28ed0;
            letter-spacing: 1px;
            margin-top: -0.3rem;
            padding-left: 0.5rem;
        }

        .badge-refrao {
            background: linear-gradient(145deg, #ff3b9e33, #b44cff33);
            border: 1px solid #b44cff55;
            padding: 0.2rem 1rem;
            border-radius: 60px;
            font-size: 0.7rem;
            color: #d4caff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-top: 0.3rem;
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: #c6b8ff;
        }

        .stat-item i {
            color: #ffd966;
        }

        .stat-item .value {
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .mode-selector {
            display: flex;
            gap: 0.5rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.3rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .mode-btn {
            padding: 0.4rem 1.2rem;
            border: none;
            border-radius: 60px;
            background: transparent;
            color: #a28ed0;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Space Grotesk', sans-serif;
        }

        .mode-btn.active {
            background: linear-gradient(145deg, #b44cff, #8b2fdb);
            color: white;
            box-shadow: 0 0 20px rgba(150, 0, 255, 0.3);
        }

        .mode-btn:hover:not(.active) {
            color: white;
        }

        .lyric-card {
            background: rgba(28, 20, 48, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 2.5rem;
            padding: 1.8rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 180, 255, 0.08);
            box-shadow: inset 0 0 30px rgba(180, 0, 255, 0.1), 0 10px 30px -10px #000000aa;
            text-align: center;
            transition: all 0.4s ease;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .lyric-card::before {
            content: '♫';
            position: absolute;
            font-size: 8rem;
            opacity: 0.03;
            right: -20px;
            bottom: -30px;
            color: #b44cff;
            transform: rotate(-10deg);
        }

        .lyric-card .verse {
            font-size: 1.8rem;
            font-weight: 600;
            line-height: 1.5;
            color: #f2eaff;
            text-shadow: 0 0 30px rgba(180, 100, 255, 0.2);
            letter-spacing: -0.2px;
            padding: 0.5rem 0;
            position: relative;
            z-index: 1;
        }

        .lyric-card .verse i {
            color: #b77aff;
            margin: 0 0.5rem;
            opacity: 0.7;
        }

        .verse-hint {
            margin-top: 0.8rem;
            font-size: 0.75rem;
            color: #a28ed0;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }

        .verse-hint i {
            margin-right: 0.3rem;
            color: #ffd966;
        }

        .search-section {
            margin-bottom: 2rem;
            position: relative;
        }

        .search-wrapper {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
        }

        #songInput {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(10, 6, 24, 0.7);
            backdrop-filter: blur(4px);
            color: #f0edff;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: all 0.25s ease;
            box-shadow: 0 0 0 0px rgba(180, 0, 255, 0);
        }

        #songInput:focus {
            border-color: #b44cff;
            box-shadow: 0 0 25px rgba(180, 0, 255, 0.3), 0 0 0 2px rgba(180, 0, 255, 0.2);
            background: rgba(14, 8, 34, 0.8);
        }

        #songInput::placeholder {
            color: #6b5d8a;
            font-weight: 400;
        }

        .btn-primary {
            background: linear-gradient(145deg, #b44cff, #8b2fdb);
            border: none;
            padding: 1rem 2.2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            box-shadow: 0 0 25px rgba(150, 0, 255, 0.4);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'Space Grotesk', sans-serif;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px #b44cffaa;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-primary:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .autocomplete-list {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: rgba(18, 12, 38, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 1.8rem;
            padding: 0.5rem 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            z-index: 30;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .autocomplete-list.active {
            display: block;
        }

        .autocomplete-item {
            padding: 0.7rem 1.8rem;
            cursor: pointer;
            transition: 0.1s ease;
            display: flex;
            justify-content: space-between;
            color: #d4caff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .autocomplete-item:hover {
            background: rgba(150, 70, 255, 0.2);
            color: white;
        }

        .autocomplete-item .artist-name {
            color: #a28ed0;
            font-size: 0.85rem;
        }

        .comparison-table {
            background: rgba(16, 10, 34, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.5rem;
            margin: 1.8rem 0 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
        }

        .comparison-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.95rem;
        }

        .comparison-row:last-child {
            border-bottom: none;
        }

        .cmp-label {
            font-weight: 400;
            color: #b7a8e0;
            letter-spacing: 0.3px;
        }

        .cmp-value {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cmp-value .badge {
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
        }

        .badge.green {
            background: #1f5f3f;
            color: #9bffb0;
            border-color: #34b86b;
            box-shadow: 0 0 15px #1aff6e33;
        }
        .badge.yellow {
            background: #5f4b1a;
            color: #ffd966;
            border-color: #d4a022;
            box-shadow: 0 0 15px #ffbb3333;
        }
        .badge.red {
            background: #4f1e2a;
            color: #ff8a8a;
            border-color: #d43f4f;
            box-shadow: 0 0 15px #ff3b3b33;
        }

        .arrow-up { color: #7affb0; margin-left: 4px; }
        .arrow-down { color: #ff7b9e; margin-left: 4px; }

        .cmp-value i {
            margin-right: 6px;
            font-size: 0.9rem;
        }

        .feedback-message {
            text-align: center;
            font-weight: 600;
            padding: 0.8rem 0;
            font-size: 1.1rem;
            min-height: 3.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .feedback-message.success {
            color: #b4ffb4;
            text-shadow: 0 0 20px #00ff88aa;
        }

        .feedback-message.error {
            color: #ffb0b0;
        }

        .feedback-message.loading {
            color: #b77aff;
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { opacity: 1; transform: translateY(-20px) rotate(0deg) scale(1); }
            100% { opacity: 0; transform: translateY(110vh) rotate(720deg) scale(0.2); }
        }

        .pulse-glow {
            animation: audioPulse 0.8s ease 3;
        }

        @keyframes audioPulse {
            0% { box-shadow: 0 0 0 0 #ff3b9e88, 0 0 0 0 #b44cff66; }
            50% { box-shadow: 0 0 40px 10px #ff3b9eaa, 0 0 80px 30px #b44cff66; }
            100% { box-shadow: 0 0 0 0 #ff3b9e88, 0 0 0 0 #b44cff66; }
        }

        .next-round-btn {
            background: linear-gradient(145deg, #3bc9ff, #7b4cff);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            box-shadow: 0 0 25px rgba(59, 201, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'Space Grotesk', sans-serif;
            margin-top: 1rem;
        }

        .next-round-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px #3bc9ffaa;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #b44cff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .game-container { padding: 1.5rem; }
            .header h1 { font-size: 1.7rem; }
            .lyric-card .verse { font-size: 1.3rem; }
            .btn-primary { padding: 0.8rem 1.8rem; }
            .stats { padding: 0.3rem 1rem; gap: 0.8rem; }
            .stat-item { font-size: 0.8rem; }
        }

        .autocomplete-list::-webkit-scrollbar {
            width: 4px;
            background: transparent;
        }
        .autocomplete-list::-webkit-scrollbar-thumb {
            background: #b44cff;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="header">
            <div>
                <h1><i class="fas fa-guitar"></i> Sertanejo</h1>
                <div class="header-subtitle">Adivinhe a música pelo refrão</div>
                <span class="badge-refrao"><i class="fas fa-music"></i> Refrão do dia</span>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <i class="fas fa-trophy"></i>
                    <span>Score: </span>
                    <span class="value" id="scoreDisplay">0</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-gamepad"></i>
                    <span>Rodada: </span>
                    <span class="value" id="roundDisplay">1</span>
                </div>
            </div>
        </div>

        <div style="display: flex; justify-content: center; margin-bottom: 1.5rem;">
            <div class="mode-selector">
                <button class="mode-btn active" data-mode="daily" id="dailyModeBtn">
                    <i class="fas fa-calendar-day"></i> Diario
                </button>
                <button class="mode-btn" data-mode="infinite" id="infiniteModeBtn">
                    <i class="fas fa-infinity"></i> Infinito
                </button>
            </div>
        </div>

        <div class="lyric-card" id="lyricCard">
            <div class="verse" id="verseDisplay">
                <i class="fas fa-quote-left"></i> Carregando refrão... <i class="fas fa-quote-right"></i>
            </div>
            <div class="verse-hint" id="verseCount">
                <i class="fas fa-info-circle"></i> Refrão da música
            </div>
        </div>

        <div class="search-section">
            <div class="search-wrapper">
                <div class="search-input-wrapper">
                    <input type="text" id="songInput" placeholder="Digite o nome da música ou artista..." autocomplete="off">
                    <div class="autocomplete-list" id="autocompleteList"></div>
                </div>
                <button class="btn-primary" id="guessBtn"><i class="fas fa-guitar"></i> Palpitar</button>
            </div>
        </div>

        <div class="comparison-table" id="comparisonTable">
            <div class="comparison-row"><span class="cmp-label"><i class="fas fa-user"></i> Artista</span><span class="cmp-value" id="cmpArtist">---</span></div>
            <div class="comparison-row"><span class="cmp-label"><i class="fas fa-tag"></i> Genero</span><span class="cmp-value" id="cmpGenre">---</span></div>
            <div class="comparison-row"><span class="cmp-label"><i class="fas fa-calendar"></i> Decada</span><span class="cmp-value" id="cmpDecade">---</span></div>
            <div class="comparison-row"><span class="cmp-label"><i class="fas fa-globe"></i> Nacionalidade</span><span class="cmp-value" id="cmpNationality">---</span></div>
            <div class="comparison-row"><span class="cmp-label"><i class="fas fa-chart-line"></i> Popularidade</span><span class="cmp-value" id="cmpPopularity">---</span></div>
        </div>

        <div class="feedback-message" id="feedbackMessage">
            <i class="fas fa-info-circle"></i> Adivinhe a música pelo refrão!
        </div>

        <div style="text-align: center; display: none;" id="nextRoundContainer">
            <button class="next-round-btn" id="nextRoundBtn">
                <i class="fas fa-forward"></i> Proxima Rodada
            </button>
        </div>
    </div>
